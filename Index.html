<!DOCTYPE html>
<html lang="sr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>8. Mart - Volim Te ❤️</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #ffc0cb 0%, #ffb6c1 25%, #ff69b4 50%, #ff1493 75%, #db7093 100%);
            background-size: 400% 400%;
            animation: gradientShift 8s ease infinite;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow-x: hidden;
            position: relative;
        }

        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .floating-heart {
            position: absolute;
            color: rgba(255, 255, 255, 0.4);
            font-size: 24px;
            animation: float 6s ease-in-out infinite;
            pointer-events: none;
        }

        @keyframes float {
            0%, 100% { transform: translateY(100vh) rotate(0deg); opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { transform: translateY(-100vh) rotate(720deg); opacity: 0; }
        }

        .container {
            text-align: center;
            padding: 30px;
            z-index: 10;
            background: rgba(255, 255, 255, 0.25);
            backdrop-filter: blur(10px);
            border-radius: 30px;
            border: 3px solid rgba(255, 255, 255, 0.6);
            box-shadow: 0 8px 32px rgba(255, 20, 147, 0.3);
            margin: 20px;
            max-width: 90%;
        }

        h1 {
            color: #fff;
            font-size: 2.2em;
            margin-bottom: 25px;
            text-shadow: 3px 3px 6px rgba(0, 0, 0, 0.2);
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        .message {
            color: #fff;
            font-size: 1.6em;
            font-weight: bold;
            margin: 25px 0;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.2);
            line-height: 1.5;
        }

        .minecraft-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 25px;
            margin: 25px 0;
        }

        .hearts-row {
            display: flex;
            gap: 15px;
            justify-content: center;
            flex-wrap: wrap;
            align-items: center;
        }

        /* Normalna slatka srca */
        .cute-heart {
            font-size: 60px;
            animation: heartbeat 1.5s ease-in-out infinite;
            filter: drop-shadow(3px 3px 0px rgba(0,0,0,0.2));
            display: inline-block;
        }

        .cute-heart:nth-child(2) { 
            animation-delay: 0.2s; 
            font-size: 70px;
        }
        .cute-heart:nth-child(3) { 
            animation-delay: 0.4s;
            font-size: 60px;
        }

        @keyframes heartbeat {
            0%, 100% { transform: scale(1); }
            25% { transform: scale(1.15); }
            50% { transform: scale(1); }
            75% { transform: scale(1.2); }
        }

        /* Minecraft Rose */
        .mc-rose {
            width: 100px;
            height: 100px;
            position: relative;
            animation: sway 3s ease-in-out infinite;
            filter: drop-shadow(3px 3px 0px rgba(0,0,0,0.3));
            image-rendering: pixelated;
            shape-rendering: crispEdges;
        }

        @keyframes sway {
            0%, 100% { transform: rotate(-5deg); }
            50% { transform: rotate(5deg); }
        }

        .date-badge {
            background: linear-gradient(135deg, #ff6b9d, #c44569);
            color: white;
            padding: 15px 30px;
            border-radius: 50px;
            font-size: 1.2em;
            font-weight: bold;
            margin-top: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            border: 3px solid white;
            display: inline-block;
        }

        .sparkle {
            position: absolute;
            width: 4px;
            height: 4px;
            background: white;
            border-radius: 50%;
            animation: sparkle 2s linear infinite;
        }

        @keyframes sparkle {
            0%, 100% { opacity: 0; transform: scale(0); }
            50% { opacity: 1; transform: scale(1); }
        }

        @media (max-width: 600px) {
            h1 { font-size: 1.8em; }
            .message { font-size: 1.3em; }
            .cute-heart { font-size: 50px; }
            .cute-heart:nth-child(2) { font-size: 60px; }
            .cute-heart:nth-child(3) { font-size: 50px; }
            .mc-rose { width: 80px; height: 80px; }
        }
    </style>
</head>
<body>
    <div id="floatingHearts"></div>

    <div class="container">
        <h1>🌸 Srećan 8. Mart 🌸</h1>
        
        <div class="minecraft-section">
            <!-- 3 Normalna slatka srca -->
            <div class="hearts-row">
                <span class="cute-heart">❤️</span>
                <span class="cute-heart">💖</span>
                <span class="cute-heart">❤️</span>
            </div>

            <!-- Minecraft Rose -->
            <svg class="mc-rose" viewBox="0 0 16 16" xmlns="http://www.w3.org/2000/svg" shape-rendering="crispEdges">
                <!-- List/Stem zeleni -->
                <rect x="7" y="8" width="2" height="2" fill="#5D8C22"/>
                <rect x="7" y="10" width="2" height="2" fill="#5D8C22"/>
                <rect x="5" y="12" width="2" height="2" fill="#5D8C22"/>
                <rect x="9" y="12" width="2" height="2" fill="#5D8C22"/>
                <rect x="7" y="14" width="2" height="2" fill="#5D8C22"/>
                
                <!-- Stem tamniji -->
                <rect x="7" y="6" width="2" height="2" fill="#3D5C12"/>
                
                <!-- Rose flower - dark red -->
                <rect x="5" y="0" width="2" height="2" fill="#8B0000"/>
                <rect x="9" y="0" width="2" height="2" fill="#8B0000"/>
                <rect x="3" y="2" width="2" height="2" fill="#8B0000"/>
                <rect x="11" y="2" width="2" height="2" fill="#8B0000"/>
                <rect x="1" y="4" width="2" height="2" fill="#8B0000"/>
                <rect x="13" y="4" width="2" height="2" fill="#8B0000"/>
                <rect x="3" y="6" width="2" height="2" fill="#8B0000"/>
                <rect x="11" y="6" width="2" height="2" fill="#8B0000"/>
                <rect x="5" y="8" width="2" height="2" fill="#8B0000"/>
                <rect x="9" y="8" width="2" height="2" fill="#8B0000"/>
                
                <!-- Rose flower - bright red -->
                <rect x="7" y="0" width="2" height="2" fill="#FF0000"/>
                <rect x="5" y="2" width="2" height="2" fill="#FF0000"/>
                <rect x="7" y="2" width="2" height="2" fill="#FF4444"/>
                <rect x="9" y="2" width="2" height="2" fill="#FF0000"/>
                <rect x="3" y="4" width="2" height="2" fill="#FF0000"/>
                <rect x="5" y="4" width="2" height="2" fill="#FF4444"/>
                <rect x="7" y="4" width="2" height="2" fill="#FF6666"/>
                <rect x="9" y="4" width="2" height="2" fill="#FF4444"/>
                <rect x="11" y="4" width="2" height="2" fill="#FF0000"/>
                <rect x="5" y="6" width="2" height="2" fill="#FF0000"/>
                <rect x="7" y="6" width="2" height="2" fill="#FF4444"/>
                <rect x="9" y="6" width="2" height="2" fill="#FF0000"/>
                <rect x="7" y="8" width="2" height="2" fill="#FF0000"/>
            </svg>
        </div>

        <div class="message">
            Volim te najviše<br>
            ljubavi moja ❤️
        </div>

        <div class="date-badge">
            🌹 8. Mart 🌹
        </div>
    </div>

    <script>
        function createFloatingHearts() {
            const container = document.getElementById('floatingHearts');
            const heartSymbols = ['❤️', '💖', '💕', '💗', '💝', '💘'];
            
            setInterval(() => {
                const heart = document.createElement('div');
                heart.className = 'floating-heart';
                heart.innerHTML = heartSymbols[Math.floor(Math.random() * heartSymbols.length)];
                heart.style.left = Math.random() * 100 + 'vw';
                heart.style.animationDuration = (Math.random() * 3 + 4) + 's';
                heart.style.fontSize = (Math.random() * 20 + 15) + 'px';
                container.appendChild(heart);
                
                setTimeout(() => {
                    heart.remove();
                }, 7000);
            }, 800);
        }

        function createSparkles() {
            const rose = document.querySelector('.mc-rose');
            setInterval(() => {
                const sparkle = document.createElement('div');
                sparkle.className = 'sparkle';
                sparkle.style.left = (Math.random() * 100) + 'px';
                sparkle.style.top = (Math.random() * 100) + 'px';
                rose.style.position = 'relative';
                rose.appendChild(sparkle);
                
                setTimeout(() => {
                    sparkle.remove();
                }, 2000);
            }, 500);
        }

        createFloatingHearts();
        createSparkles();
    </script>
</body>
</html>
